name: Azure ML Pipeline

on:
push:
branches:
- main

jobs:
train:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Azure Login
    uses: azure/login@v2
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  - name: Install ML extension
    run: az extension add -n ml

  - name: Run ML Job
    run: az ml job create --file job.yml --resource-group zeeshansayyed4242-rg --workspace-name zeeshan23
```
